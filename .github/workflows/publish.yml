name: brew pr-pull
on:
  pull_request:
    types:
      - labeled

jobs:
  pr-pull:
    if: github.event.label.name == 'pr-pull'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Pull and Upload Bottles to GHCR
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Log into the GitHub Container Registry
          echo "${{ secrets.HOMEBREW_TAP_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Pull the PR artifacts and upload them as packages
          brew pr-pull --debug --upload \
            --root-url="https://ghcr.io{{ github.repository_owner }}/tap" \
            --tap="$GITHUB_REPOSITORY" \
            "${{ github.event.pull_request.number }}"

      - name: Push formula changes back to main branch
        uses: Homebrew/actions/git-try-push@main
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: main
